{% extends "base.html" %}

{% block title %}Track Product{% endblock %}

{% block content %}
<div class="center-wrapper">
    <div class="glass-panel" style="width: 100%; max-width: 600px; text-align: center;">
        <h2>Track A New Product</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Paste an Amazon, Flipkart, Nykaa, or boAt URL below.</p>
        
        <form method="POST" action="/home">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="input-group">
                <input type="text" name="product_url" placeholder="https://..." required class="input-field" />
            </div>
            <button type="submit" class="btn" style="width: 100%">Fetch Product Info</button>
        </form>
    </div>
</div>
{% endblock %}
