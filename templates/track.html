{% extends "base.html" %}

{% block title %}Product Info{% endblock %}

{% block content %}
<div class="center-wrapper">
    <div class="glass-panel" style="width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; gap: 2.5rem; align-items: center;">
        <div style="flex: 1; min-width: 250px; text-align: center; background: rgba(0,0,0,0.3); padding: 2rem; border-radius: 12px; border: 1px solid var(--glass-border);">
             <img src="{{ product_image }}" style="max-width: 100%; max-height: 250px; object-fit: contain;" alt="Product image">
        </div>
        <div style="flex: 1.5; min-width: 300px;">
            <h2 style="margin-bottom: 0.5rem; line-height: 1.3;">{{ product_title }}</h2>
            <a href="{{ product.url }}" target="_blank" style="color: var(--accent-glow); margin-bottom: 2rem; display: inline-block;">View on Store ↗</a>
            
            <p style="color: var(--text-secondary);">Current Price</p>
            <h1 class="price-tag status-green" style="font-size: 3rem; margin-bottom: 2rem;">₹{{ current_price }}</h1>
            
            <form method="POST" action="{{ url_for('track_product', product_id=product.id) }}" style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <label for="target_price" style="display: block; margin-bottom: 0.8rem; font-weight: 600; color: white;">Email Notification Target Price:</label>
                <div class="input-group">
                    <input type="number" step="1" min="1" name="target_price" id="target_price" required class="input-field" value="{{ product.target_price or current_price }}" />
                </div>
                <button type="submit" class="btn" style="width: 100%;">Save Alert Target</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
