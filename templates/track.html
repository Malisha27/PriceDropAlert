{% extends "base.html" %}

{% block title %}Product Info{% endblock %}

{% block content %}
<div class="center-wrapper">
    <div class="glass-panel" style="width: 100%; max-width: 860px; display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center; padding: 1.5rem;">

        <!-- Product Image -->
        <div style="flex: 1; min-width: 180px; text-align: center; background: rgba(0,0,0,0.3); padding: 1.2rem; border-radius: 12px; border: 1px solid var(--glass-border);">
            <img src="{{ product_image }}" style="max-width: 100%; max-height: 170px; object-fit: contain;" alt="Product image">
        </div>

        <!-- Product Details -->
        <div style="flex: 1.5; min-width: 280px;">
            <!-- Title clamped to 2 lines so long names never overflow -->
            <h2 title="{{ product_title }}"
                style="margin-bottom: 0.35rem; line-height: 1.35; font-size: 1rem;
                       display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                {{ product_title }}
            </h2>

            <a href="{{ product.url }}" target="_blank"
               style="color: var(--accent-glow); font-size: 0.85rem; margin-bottom: 0.9rem; display: inline-block;">
                View on Store ↗
            </a>

            <p style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.2rem;">Current Price</p>
            <p class="price-tag status-green" style="font-size: 2rem; margin-bottom: 1rem;">₹{{ current_price }}</p>

            <!-- Alert Target Form -->
            <form method="POST" action="{{ url_for('track_product', product_id=product.id) }}"
                  style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <label for="target_price"
                       style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: white; font-size: 0.85rem;">
                    Email Notification Target Price:
                </label>
                <div class="input-group" style="margin-bottom: 0.75rem;">
                    <input type="number" step="1" min="1" name="target_price" id="target_price"
                           required class="input-field" value="{{ product.target_price or current_price }}" />
                </div>
                <button type="submit" class="btn" style="width: 100%;">Save Alert Target</button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
