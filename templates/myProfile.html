{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}
<div class="center-wrapper">
    <div class="glass-panel" style="width: 100%; max-width: 500px;">
        <h2>My Profile</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Logged in as: <span style="color: white; font-weight: 500;">{{ current_user.email }}</span></p>

        <form method="POST" action="{{ url_for('myProfile') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Change Password</h3>
            
            <div class="input-group">
                <input type="password" name="old_password" placeholder="Current Password" required class="input-field">
            </div>
            
            <div class="input-group">
                <input type="password" name="new_password" placeholder="New Password" required class="input-field">
            </div>
            
            <div class="input-group">
                <input type="password" name="confirm_password" placeholder="Confirm New Password" required class="input-field">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
