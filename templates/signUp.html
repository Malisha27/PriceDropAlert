{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="center-wrapper">
    <div class="glass-panel" style="width: 100%; max-width: 450px;">
        <form method="POST" action="/signUp">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <h2 style="margin-bottom: 2rem; text-align: center;">Join PriceDropAlert</h2>

            <div class="input-group">
                <input type="text" name="name" required placeholder="Full Name" class="input-field" />
            </div>

            <div class="input-group">
                <input type="email" name="email" required placeholder="Email Address" class="input-field" />
            </div>

            <div class="input-group">
                <input type="password" name="password" required placeholder="Create Password" class="input-field" />
                <small style="color: var(--text-secondary); display: block; margin-top: 0.5rem; font-size: 0.75rem; line-height: 1.4;">Must be highly secure (8+ chars, uppercase, lowercase, number, special char).</small>
            </div>

            <div class="input-group">
                <input type="password" name="confirm_password" required placeholder="Confirm Password" class="input-field" />
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-bottom: 1.5rem; padding: 1rem;">Create Account</button>

            <p style="text-align: center; color: var(--text-secondary); font-size: 0.95rem;">
                Already have an account? <a href="/signIn" style="color: var(--accent-light); font-weight: 600; text-decoration: none;">Log In</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
